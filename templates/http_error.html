<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ status_code }} - {{ title }}</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #0d6efd;
            --border: #dbe3ef;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at 20% 20%, #eaf2ff 0%, var(--bg) 45%);
            color: var(--text);
            font-family: "DM Sans", "Segoe UI", sans-serif;
        }
        .panel {
            width: min(620px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 36px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }
        .code {
            margin: 0 0 8px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }
        p {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.5;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .button {
            text-decoration: none;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            background: #fff;
            font-weight: 600;
        }
        .button.primary {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <main class="panel">
        <p class="code">Error {{ status_code }}</p>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <div class="actions">
            <a class="button primary" href="{{ url_for('dashboard') }}">Go to dashboard</a>
            <a class="button" href="{{ url_for('index') }}">Go to home</a>
        </div>
    </main>
</body>
</html>
